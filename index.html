<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>TIPS Ladder Rebalancer</title>
<style>
  *, *::before, *::after { box-sizing: border-box; }
  body { font-family: system-ui, sans-serif; font-size: 13px; margin: 0; padding: 20px; color: #222; background: #fafafa; }
  h1 { font-size: 18px; margin: 0 0 16px; }

  /* ── Top row (form + net cash) ── */
  #top-row { display: flex; gap: 12px; align-items: stretch; margin-bottom: 16px; }

  /* ── Form ── */
  .form-card { background: #fff; border: 1px solid #ddd; border-radius: 8px; padding: 8px 12px; }
  .fields { display: flex; flex-wrap: wrap; gap: 8px; align-items: flex-end; }
  .field { display: flex; flex-direction: column; gap: 3px; }
  .field label { font-size: 11px; font-weight: 600; color: #555; text-transform: uppercase; letter-spacing: .04em; }
  .field input, .field select { padding: 4px 6px; border: 1px solid #ccc; border-radius: 4px; font-size: 13px; }
  .field input[type="file"] { padding: 3px; }
  button { padding: 5px 14px; background: #1a56db; color: #fff; border: none; border-radius: 4px; font-size: 13px; cursor: pointer; font-weight: 600; }
  button:disabled { background: #aaa; cursor: default; }
  button:hover:not(:disabled) { background: #1748c0; }

  /* ── Status ── */
  #status { margin: 4px 0 0; font-size: 12px; color: #555; min-height: 16px; }
  #status.error { color: #c0392b; font-weight: 600; }

  /* ── Net Cash callout ── */
  #net-cash-bar { display: none; background: #fff; border: 1px solid #ddd; border-radius: 6px;
                  padding: 10px 20px; flex-direction: column; justify-content: center; }
  #net-cash-bar .nc-label { font-size: 10px; font-weight: 600; color: #888; text-transform: uppercase; letter-spacing: .04em; }
  #net-cash-bar .nc-val { font-size: 22px; font-weight: 700; margin-top: 2px; line-height: 1; }

  /* ── Parameters bar ── */
  .params-bar { display: flex; flex-wrap: wrap; gap: 0; background: #fff; border: 1px solid #ddd; border-radius: 6px; padding: 10px 16px; margin-bottom: 12px; }
  .param { display: flex; flex-direction: column; padding: 0 20px 0 0; margin-right: 20px; border-right: 1px solid #eee; }
  .param:last-child { border-right: none; padding-right: 0; margin-right: 0; }
  .param-label { font-size: 10px; font-weight: 600; color: #888; text-transform: uppercase; letter-spacing: .04em; }
  .param-val { font-weight: 600; font-size: 13px; margin-top: 2px; white-space: nowrap; }

  /* ── Detail info bar ── */
  .detail-bar { display: flex; flex-wrap: wrap; background: #fff; border-bottom: 1px solid #eee; }
  .param-group { display: flex; padding: 10px 16px; border-right: 2px solid #cbd5e1; }
  .param-group:last-child { border-right: none; }
  .param-group .param { border-right: 1px solid #eee; padding-right: 16px; margin-right: 16px; }
  .param-group .param:last-child { border-right: none; padding-right: 0; margin-right: 0; }
  .net { font-weight: 700; font-size: 16px; margin: 4px 0 0; }

  /* ── Main table ── */
  .table-wrap { overflow-x: auto; }
  table.main { border-collapse: collapse; width: 100%; background: #fff; font-size: 12px; }
  table.main th { background: #1e293b; color: #fff; padding: 5px 8px; text-align: right; font-weight: 600; white-space: nowrap; position: sticky; top: 0; }
  table.main th:first-child, table.main th:nth-child(3), table.main th:nth-child(4) { text-align: left; }
  table.main td { padding: 4px 8px; border-bottom: 1px solid #eee; white-space: nowrap; }
  table.main td.num { text-align: right; font-variant-numeric: tabular-nums; }
  table.main tr:hover td { background: #fffde7; }
  .pos { color: #16a34a; } .neg { color: #dc2626; }
  .net.pos { color: #16a34a; } .net.neg { color: #dc2626; }

  /* ── Data freshness ── */
  #data-info { font-size: 11px; color: #888; margin-bottom: 16px; }

  /* ── Tabs ── */
  .tabs { display: flex; gap: 2px; margin-bottom: 0; }
  .tab-btn { padding: 6px 16px; background: #e2e8f0; border: 1px solid #cbd5e1; border-bottom: none;
             border-radius: 5px 5px 0 0; font-size: 12px; font-weight: 600; color: #64748b;
             cursor: pointer; }
  .tab-btn.active { background: #fff; color: #1e293b; border-color: #ddd; }
  .tab-panels { border: 1px solid #ddd; border-radius: 0 6px 6px 6px; background: #fff; }
  .tab-panel { display: none; }
  .tab-panel.active { display: block; }

  /* ── Simple table ── */
  table.simple { border-collapse: collapse; width: auto; font-size: 13px; }
  table.simple th { background: #1e293b; color: #fff; padding: 6px 12px; text-align: right;
                    font-weight: 600; white-space: nowrap; position: sticky; top: 0; }
  table.simple th:first-child, table.simple th:nth-child(2), table.simple th:nth-child(3) { text-align: left; }
  table.simple td { padding: 6px 12px; border-bottom: 1px solid #eee; white-space: nowrap; font-variant-numeric: tabular-nums; }
  table.simple td:not(:first-child):not(:nth-child(2)):not(:nth-child(3)) { text-align: right; }
  table.simple tr.no-change td { color: #bbb; }
  table.simple tr:hover td { background: #fffde7; }

  #output { display: none; }
</style>
<script data-goatcounter="https://tipsladder.goatcounter.com/count"
        async src="//gc.zgo.at/count.js"></script>
</head>
<body>
<h1>TIPS Ladder Rebalancer</h1>

<div id="data-info">Loading market data…</div>

<div id="top-row">
  <div class="form-card">
    <div class="fields">
      <div class="field">
        <label>Holdings CSV</label>
        <input type="file" id="holdings-file" accept=".csv">
      </div>
      <div class="field">
        <label>DARA ($)</label>
        <input type="number" id="dara" placeholder="auto-infer" step="1" min="0" style="width:110px">
      </div>
      <div class="field">
        <label>Method</label>
        <select id="method">
          <option value="Gap">Gap</option>
          <option value="Full">Full</option>
        </select>
      </div>
      <div class="field" style="justify-content:flex-end">
        <button id="run-btn" disabled>Run Rebalance</button>
      </div>
    </div>
    <div id="status"></div>
  </div>
  <div id="net-cash-bar">
    <div class="nc-label">Net Cash</div>
    <div class="nc-val" id="net-cash-val"></div>
  </div>
</div>

<div id="output">
  <div class="params-bar" id="params-bar"></div>
  <div class="tabs">
    <button class="tab-btn active" data-tab="simple">Simple</button>
    <button class="tab-btn" data-tab="detail">Detail</button>
  </div>
  <div class="tab-panels">
    <div class="tab-panel active" id="tab-simple">
      <div class="table-wrap" style="padding:12px 16px">
        <table class="simple" id="simple-table"></table>
      </div>
    </div>
    <div class="tab-panel" id="tab-detail">
      <div class="detail-bar" id="detail-bar"></div>
      <div class="table-wrap">
        <table class="main" id="main-table"></table>
      </div>
    </div>
  </div>
</div>

<script type="module">
import { buildTipsMapFromYields, localDate, runRebalance } from './rebalance-lib.js';

// ─── CSV parser (simple: no quoted-field support needed for these CSVs) ──────
function parseCsv(text) {
  const lines = text.trim().split('\n').filter(l => l.trim());
  if (lines.length < 2) return [];
  const headers = lines[0].split(',').map(s => s.trim());
  return lines.slice(1).map(line => {
    const vals = line.split(',').map(s => s.trim());
    const obj = {};
    headers.forEach((h, i) => { obj[h] = vals[i] ?? ''; });
    return obj;
  });
}

// ─── Load data CSVs from same repo ───────────────────────────────────────────
let tipsMap = null, refCpiRows = null, settlementDate = null;

async function loadData() {
  const status = document.getElementById('status');
  const dataInfo = document.getElementById('data-info');
  try {
    const [yieldsRes, refCpiRes] = await Promise.all([
      fetch('./data/TipsYields.csv'),
      fetch('./data/RefCPI.csv'),
    ]);
    if (!yieldsRes.ok) throw new Error(`TipsYields.csv: HTTP ${yieldsRes.status}`);
    if (!refCpiRes.ok) throw new Error(`RefCPI.csv: HTTP ${refCpiRes.status}`);

    const yieldsRows = parseCsv(await yieldsRes.text()).map(r => ({
      settlementDate: r.settlementDate,
      cusip:    r.cusip,
      maturity: r.maturity,
      coupon:   parseFloat(r.coupon),
      baseCpi:  parseFloat(r.baseCpi),
      price:    parseFloat(r.price)  || null,
      yield:    parseFloat(r.yield)  || null,
    }));

    refCpiRows = parseCsv(await refCpiRes.text()).map(r => ({
      date:   r.date,
      refCpi: parseFloat(r.refCpi),
    }));

    // Settlement date = date field from TipsYields.csv (all rows share same date)
    const settleDateStr = yieldsRows[0]?.settlementDate;
    if (!settleDateStr) throw new Error('TipsYields.csv has no settlementDate');
    settlementDate = localDate(settleDateStr);

    tipsMap = buildTipsMapFromYields(yieldsRows);

    dataInfo.textContent = `Market data as of ${settleDateStr} · ${yieldsRows.length} TIPS · RefCPI rows: ${refCpiRows.length}`;
    document.getElementById('run-btn').disabled = false;

    // Pre-populate sample holdings if no file already selected
    const fileInput = document.getElementById('holdings-file');
    if (!fileInput.files.length) {
      try {
        const sampleRes = await fetch('./data/CusipQtyTest.csv');
        if (sampleRes.ok) {
          const blob = await sampleRes.blob();
          const file = new File([blob], 'CusipQtyTest.csv', { type: 'text/csv' });
          const dt = new DataTransfer();
          dt.items.add(file);
          fileInput.files = dt.files;
        }
      } catch (_) { /* sample load failure is non-fatal */ }
    }
  } catch (err) {
    dataInfo.textContent = '';
    setStatus('Failed to load market data: ' + err.message, true);
  }
}

// ─── Helpers ─────────────────────────────────────────────────────────────────
function setStatus(msg, isError = false) {
  const el = document.getElementById('status');
  el.textContent = msg;
  el.className = isError ? 'error' : '';
}

function lookupRefCpi(dateStr) {
  const matches = refCpiRows.filter(r => r.date <= dateStr);
  if (matches.length === 0) throw new Error(`No RefCPI data on or before ${dateStr}`);
  return matches[matches.length - 1].refCpi;
}

function esc(s) {
  return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}

function fmtI(n) { return typeof n === 'number' ? Math.round(n).toLocaleString() : String(n); }
function pct(n)  { return typeof n === 'number' ? (n * 100).toFixed(1) + '%' : 'N/A'; }
function sign(n) {
  if (typeof n !== 'number') return String(n);
  const r = Math.round(n);
  return (r > 0 ? '+' : '') + r.toLocaleString();
}

function cell(v, ci) {
  let s;
  if (typeof v !== 'number') {
    s = String(v);
  } else if (ci === 1 || ci === 3) {
    s = String(Math.round(v));
  } else {
    s = Math.round(v).toLocaleString('en-US');
  }
  return `<td class="${ci >= 4 ? 'num' : ''}">${esc(s)}</td>`;
}

// ─── Tab switching ────────────────────────────────────────────────────────────
document.querySelectorAll('.tab-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById('tab-' + btn.dataset.tab).classList.add('active');
  });
});

// ─── Render output ────────────────────────────────────────────────────────────
function renderOutput({ results, HDR, summary }) {
  const {
    settleDateDisp, refCPI, DARA, inferredDARA, method,
    firstYear, lastYear, rungCount, gapYears,
    gapParams, brackets,
    lowerDuration, upperDuration, lowerWeight, upperWeight,
    beforeLowerWeight, beforeUpperWeight, afterLowerWeight, afterUpperWeight,
    totalCurrentExcess, totalExcessCost,
    costDeltaSum,
  } = summary;

  const ncBar = document.getElementById('net-cash-bar');
  const ncVal = document.getElementById('net-cash-val');
  ncVal.textContent = sign(costDeltaSum);
  ncVal.className = 'nc-val ' + (costDeltaSum >= 0 ? 'pos' : 'neg');
  ncBar.style.display = 'flex';

  const param = (label, val) =>
    `<div class="param"><span class="param-label">${label}</span><span class="param-val">${val}</span></div>`;

  document.getElementById('params-bar').innerHTML =
    param('Date',          esc(settleDateDisp)) +
    param('RefCPI',        refCPI) +
    param('DARA',          fmtI(DARA)) +
    param('Inferred DARA', fmtI(inferredDARA)) +
    param('Method',        esc(method)) +
    param('Range',         `${firstYear} – ${lastYear} (${rungCount} rungs)`) +
    param('Gap Years',     gapYears.join(', ') || '—');

  const dp = (label, val) =>
    `<div class="param"><span class="param-label">${label}</span><span class="param-val">${val}</span></div>`;

  const wpct = n => typeof n === 'number' ? Math.round(n * 100) + '%' : 'N/A';

  const grp = (...items) => `<div class="param-group">${items.join('')}</div>`;

  document.getElementById('detail-bar').innerHTML =
    grp(
      dp('Gap Avg Dur',                       gapParams.avgDuration.toFixed(1)),
      dp(`Lower Dur (${brackets.lowerYear})`, lowerDuration.toFixed(1)),
      dp(`Upper Dur (${brackets.upperYear})`, upperDuration.toFixed(1)),
    ) +
    grp(
      dp('Gap Total Cost', fmtI(gapParams.totalCost)),
      dp('Excess Before',  fmtI(totalCurrentExcess)),
      dp('Excess After',   fmtI(totalExcessCost)),
    ) +
    grp(
      dp('Lower Wt Target/Before/After', `${wpct(lowerWeight)} / ${wpct(beforeLowerWeight)} / ${wpct(afterLowerWeight)}`),
      dp('Upper Wt Target/Before/After', `${wpct(upperWeight)} / ${wpct(beforeUpperWeight)} / ${wpct(afterUpperWeight)}`),
    );

  const tableEl = document.getElementById('main-table');
  const headerRow = `<thead><tr>${HDR.map(h => `<th>${esc(h)}</th>`).join('')}</tr></thead>`;
  const bodyRows  = results.map(r => '<tr>' + r.map((v, ci) => cell(v, ci)).join('') + '</tr>').join('\n');
  tableEl.innerHTML = headerRow + `<tbody>${bodyRows}</tbody>`;

  // Colour Qty Delta (col 9) and Cost Delta (col 11)
  tableEl.querySelectorAll('tbody tr').forEach(tr => {
    [9, 11].forEach(ci => {
      const td = tr.cells[ci];
      if (!td) return;
      const v = parseFloat(td.textContent.replace(/,/g, ''));
      if (!isNaN(v) && v !== 0) td.classList.add(v > 0 ? 'pos' : 'neg');
    });
  });

  // Simple view
  // HDR: 0=CUSIP 1=Qty 2=Maturity 3=FY 8=Target Qty 9=Qty Delta 11=Cost Delta
  const SIMPLE_COLS = [
    { label: 'CUSIP',    ci: 0 },
    { label: 'Maturity', ci: 2 },
    { label: 'FY',       ci: 3 },
    { label: 'Qty',      ci: 1 },
    { label: 'Target',   ci: 8 },
    { label: 'Delta',    ci: 9 },
    { label: 'Cash Δ',   ci: 11 },
  ];
  const simpleEl = document.getElementById('simple-table');
  const simpleHeader = `<thead><tr>${SIMPLE_COLS.map(c => `<th>${esc(c.label)}</th>`).join('')}</tr></thead>`;
  const simpleBody = results.map(r => {
    const delta = r[9];
    const noChange = typeof delta === 'number' && delta === 0;
    const cells = SIMPLE_COLS.map(({ ci }) => {
      const v = r[ci];
      let s;
      if (typeof v !== 'number') {
        s = String(v);
      } else if (ci === 1 || ci === 3 || ci === 8) {
        s = String(Math.round(v));  // plain integers, no comma
      } else {
        const rounded = Math.round(v);
        s = (ci === 9 || ci === 11) && rounded > 0 ? '+' + rounded.toLocaleString('en-US')
          : rounded.toLocaleString('en-US');
      }
      let cls = '';
      if ((ci === 9 || ci === 11) && typeof v === 'number' && v !== 0) cls = v > 0 ? ' class="pos"' : ' class="neg"';
      return `<td${cls}>${esc(s)}</td>`;
    }).join('');
    return `<tr class="${noChange ? 'no-change' : ''}">${cells}</tr>`;
  }).join('\n');
  simpleEl.innerHTML = simpleHeader + `<tbody>${simpleBody}</tbody>`;

  document.getElementById('output').style.display = 'block';
}

// ─── Run handler ─────────────────────────────────────────────────────────────
document.getElementById('run-btn').addEventListener('click', async () => {
  setStatus('');
  const fileInput = document.getElementById('holdings-file');
  if (!fileInput.files.length) { setStatus('Please select a holdings CSV file.', true); return; }

  const daraInput = document.getElementById('dara').value.trim();
  const dara      = daraInput ? parseFloat(daraInput) : null;
  const method    = document.getElementById('method').value;

  const text = await fileInput.files[0].text();
  const rawLines = text.trim().split('\n').filter(l => l.trim());
  if (rawLines.length === 0) { setStatus('Holdings CSV is empty.', true); return; }

  // Detect and skip optional header row (first field not 9 alphanumeric chars)
  const CUSIP_RE = /^[A-Z0-9]{9}$/i;
  const startIdx = CUSIP_RE.test(rawLines[0].split(',')[0].trim()) ? 0 : 1;

  const holdingsRaw = new Map();
  for (let i = startIdx; i < rawLines.length; i++) {
    const parts = rawLines[i].split(',').map(s => s.trim());
    const lineNum = i + 1;
    if (parts.length < 2) {
      setStatus(`Row ${lineNum}: expected "cusip,qty" — got "${rawLines[i]}"`, true); return;
    }
    const [cusip, qtyStr] = parts;
    if (!CUSIP_RE.test(cusip)) {
      setStatus(`Row ${lineNum}: "${cusip}" is not a valid 9-character CUSIP`, true); return;
    }
    const qty = parseInt(qtyStr, 10);
    if (isNaN(qty) || qty < 0) {
      setStatus(`Row ${lineNum}: qty "${qtyStr}" must be a non-negative integer`, true); return;
    }
    holdingsRaw.set(cusip, (holdingsRaw.get(cusip) ?? 0) + qty);
  }

  if (holdingsRaw.size === 0) { setStatus('Holdings CSV has no valid data rows.', true); return; }
  const holdings = Array.from(holdingsRaw, ([cusip, qty]) => ({ cusip, qty }));

  try {
    const settleDateStr = settlementDate.toLocaleDateString('en-CA');
    const refCPI = lookupRefCpi(settleDateStr);
    setStatus('Running rebalance…');
    const result = runRebalance({ dara, method, holdings, tipsMap, refCPI, settlementDate });
    renderOutput(result);
    setStatus('');
  } catch (err) {
    setStatus('Error: ' + err.message, true);
    console.error(err);
  }
});

// ─── Init ─────────────────────────────────────────────────────────────────────
loadData();
</script>
</body>
</html>
