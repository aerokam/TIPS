<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Knowledge Viewer</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0d0d1a;color:#c0c8e0;font-family:'Segoe UI',sans-serif;font-size:14px;line-height:1.7;padding:32px 48px;max-width:900px;margin:0 auto}
nav{margin-bottom:24px;display:flex;justify-content:space-between;align-items:center}
nav a{color:#5577cc;text-decoration:none;font-size:12px;letter-spacing:.5px}
nav a:hover{color:#aabbff}
#content { opacity: 0; transition: opacity 0.3s; }
#content.loaded { opacity: 1; }
h1,h2,h3,h4{color:#9090ee;margin:1.6em 0 .5em;font-weight:500}
h1{font-size:1.5em;border-bottom:1px solid #1e1e3a;padding-bottom:.4em}
h2{font-size:1.2em}
h3{font-size:1em;color:#7788cc}
p{margin:.7em 0}
a{color:#5577cc}
a:hover{color:#aabbff}
code{background:#141428;color:#aaddaa;padding:1px 5px;border-radius:3px;font-size:.9em}
pre{background:#0a0a1a;border:1px solid #1e1e3a;border-radius:6px;padding:14px 18px;overflow-x:auto;margin:1em 0}
pre code{background:none;padding:0;font-size:.85em;color:#b0c4b0}
table{border-collapse:collapse;width:100%;margin:1em 0;font-size:.9em}
th{background:#141428;color:#8888cc;font-weight:500;text-align:left;padding:8px 12px;border:1px solid #222244}
td{padding:7px 12px;border:1px solid #1a1a32;vertical-align:top}
tr:nth-child(even) td{background:#0f0f22}
blockquote{border-left:3px solid #334;margin:1em 0;padding:.5em 1em;color:#8899aa}
hr{border:none;border-top:1px solid #1e1e3a;margin:2em 0}
ul,ol{padding-left:1.4em;margin:.5em 0}
li{margin:.2em 0}
.error{color:#ff6666;padding:20px;background:#2a1a1a;border-radius:6px;border:1px solid #442222}
</style>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body>
<nav>
  <a href="./KNOWLEDGE_MAP.html">← Back to Knowledge Map</a>
  <span id="file-path" style="font-size: 11px; color: #555577;"></span>
</nav>
<main id="content">Loading...</main>

<script>
async function loadMarkdown() {
  // Use hash-based routing: viewer.html#/md/path/to.md#anchor
  const hashStr = window.location.hash || '';
  if (!hashStr || hashStr === '#') {
    // Check for legacy ?file= parameter
    const params = new URLSearchParams(window.location.search);
    const fileParam = params.get('file');
    if (fileParam) {
      window.location.hash = fileParam;
      return;
    }
    document.getElementById('content').innerHTML = `<div class="error">
      <h2>No file specified</h2>
      <p>Usage: <code>viewer.html#/md/path/to.md</code></p>
    </div>`;
    return;
  }

  // Split file path and internal anchor: #/md/file.md#anchor
  // Parts after # are: /md/file.md#anchor
  const parts = hashStr.substring(1).split('#');
  const file = parts[0];
  const internalAnchor = parts[1];

  const contentEl = document.getElementById('content');
  const pathEl = document.getElementById('file-path');

  pathEl.textContent = file;
  document.title = file.split('/').pop() + ' - Knowledge Viewer';

  try {
    // Determine the base path based on whether it's absolute or relative to repo root
    let fetchPath = file;
    if (file.startsWith('/md/')) {
        const repoRelativePath = file.substring(4);
        const isLocal = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1';
        if (isLocal) {
            fetchPath = '/' + repoRelativePath;
        } else {
            fetchPath = '../' + repoRelativePath;
        }
    }

    const response = await fetch(fetchPath);
    if (!response.ok) throw new Error(`Failed to load ${file}: ${response.statusText}`);
    
    const markdown = await response.text();
    contentEl.innerHTML = marked.parse(markdown);

    // Intercept all links in the rendered content
    contentEl.querySelectorAll('a').forEach(a => {
      const href = a.getAttribute('href');
      if (href && !href.startsWith('http')) {
        let [targetFile, hash] = href.split('#');
        
        if (!targetFile || targetFile === '.') {
          // Internal anchor to the same file
          // Keep it as #anchor, but update href to include the current file hash
          a.href = `${window.location.pathname}${window.location.hash.split('#')[0]}#${hash || ''}`;
          return;
        }

        // Convert relative or absolute links to viewer.html#/md/ format
        if (targetFile.startsWith('./')) {
            const currentDir = file.substring(0, file.lastIndexOf('/'));
            targetFile = currentDir + '/' + targetFile.substring(2);
        } else if (!targetFile.startsWith('/')) {
            const currentDir = file.substring(0, file.lastIndexOf('/'));
            targetFile = currentDir + '/' + targetFile;
        }

        if (!targetFile.startsWith('/md/')) {
            if (targetFile.startsWith('knowledge/')) targetFile = '/md/' + targetFile;
            else if (!targetFile.startsWith('/')) targetFile = '/md/' + targetFile;
        }

        a.href = `viewer.html#${targetFile}${hash ? '#' + hash : ''}`;
      }
    });

    contentEl.classList.add('loaded');

    // Handle hash scrolling
    if (internalAnchor) {
      setTimeout(() => {
        const target = document.getElementById(internalAnchor) || document.getElementsByName(internalAnchor)[0];
        if (target) target.scrollIntoView();
      }, 100);
    }
  } catch (err) {
    contentEl.innerHTML = `<div class="error">
      <h2>Error loading document</h2>
      <p>${err.message}</p>
      <p>Make sure you are running a local server or viewing on GitHub Pages.</p>
    </div>`;
    contentEl.classList.add('loaded');
  }
}

window.addEventListener('DOMContentLoaded', loadMarkdown);
window.addEventListener('hashchange', loadMarkdown);
</script>
</body>
</html>
